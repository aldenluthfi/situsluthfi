name: CI/CD
on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    check:
        name: Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: cd frontend && npx tsc --noEmit
            - run: cd backend && npx tsc --noEmit

    build:
        name: Build & Push Images
        runs-on: ubuntu-latest
        needs: check
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push backend
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/situsluthfi-backend:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/situsluthfi-backend:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  context: ./frontend
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/situsluthfi-frontend:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/situsluthfi-frontend:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: webfactory/ssh-agent@v0.8.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
            - run: ssh-keyscan -H 193.180.208.235 >> ~/.ssh/known_hosts
            - run: >
                  ssh aldenluthfi@193.180.208.235
                  "cd situsluthfi && IMAGE_TAG=${{ github.sha }} ./deploy.sh"
            - run: rm -rf ~/.ssh
